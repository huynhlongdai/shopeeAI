<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>shopeeAI Bridge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f0f0f7;
        --card: #ffffff;
        --ink: #333239;
        --muted: #6f7482;
        --line: #dedff0;
        --blue: #4351ac;
        --mint: #95e8ca;
      }
      * { box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 20px 50px rgba(51, 50, 57, .08);
        display: grid;
        gap: 14px;
        margin: 0 auto;
        max-width: 680px;
        padding: 22px;
      }
      h1, p { margin: 0; }
      h1 { font-size: 24px; letter-spacing: 0; }
      p { color: var(--muted); }
      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
      }
      .mark {
        align-items: center;
        background: var(--mint);
        border-radius: 8px;
        color: #1f4b3a;
        display: grid;
        font-weight: 900;
        height: 44px;
        place-items: center;
        width: 44px;
      }
      .actions {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      button {
        background: var(--blue);
        border: 0;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 40px;
        padding: 10px 12px;
      }
      button.secondary {
        background: #eef0f7;
        color: var(--ink);
      }
      code {
        background: #f6f6fb;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: block;
        overflow-wrap: anywhere;
        padding: 10px;
      }
      #status {
        background: #f8f8fc;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        padding: 10px;
      }
      @media (max-width: 640px) {
        .actions { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark">SA</div>
        <div>
          <h1>shopeeAI Bridge</h1>
          <p>The full dashboard now runs on the local API server.</p>
        </div>
      </div>
      <code id="adminUrl">http://127.0.0.1:8787/admin/</code>
      <div class="actions">
        <button id="openAdmin">Open admin</button>
        <button id="checkServer" class="secondary">Check server</button>
        <button id="pollNow" class="secondary">Run queue</button>
      </div>
      <div id="status">Ready.</div>
    </main>
    <script>
      const statusEl = document.querySelector('#status');
      const adminUrlEl = document.querySelector('#adminUrl');

      document.querySelector('#openAdmin').addEventListener('click', () => {
        chrome.runtime.sendMessage({ type: 'open-manager' }).then((response) => {
          statusEl.textContent = response?.ok ? `Opened ${response.result?.url || 'admin'}.` : response?.error || 'Open failed.';
        });
      });

      document.querySelector('#checkServer').addEventListener('click', () => {
        chrome.runtime.sendMessage({ type: 'check-server' }).then((response) => {
          statusEl.textContent = response?.ok && response.result?.ok ? 'Server online.' : response?.error || 'Server offline.';
        });
      });

      document.querySelector('#pollNow').addEventListener('click', () => {
        chrome.runtime.sendMessage({ type: 'poll-now' }).then((response) => {
          statusEl.textContent = response?.ok ? 'Queue poll requested.' : response?.error || 'Poll failed.';
        });
      });

      chrome.storage.local.get({ apiBase: 'http://127.0.0.1:8787' }).then((settings) => {
        adminUrlEl.textContent = `${String(settings.apiBase || '').replace(/\/+$/, '')}/admin/`;
      });
    </script>
  </body>
</html>
